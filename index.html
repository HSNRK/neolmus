.clk{font-size:11px;color:#888;margin-top:2px}
.hdr-r{display:flex;gap:7px;flex-shrink:0}
.pill{display:flex;align-items:center;gap:5px;background:#1c1c1e;color:#e8e4dc;padding:6px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;border:none}
.pill.on{background:#1a2e1a;color:#5cba5c}
.pill-gold{background:#1a1500;color:#f0c040;border:1px solid #b8860b}

/* UPDATE BAR */
#upd{display:flex;padding:4px 14px;font-size:10px;color:#333;border-bottom:1px solid #141414}
#upd-t{color:#555;margin-left:auto}

/* ACCORDION */
.acc{border-bottom:1px solid #1a1a1a}
.acc-hd{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none;-webkit-user-select:none}
.acc-ico{font-size:18px;flex-shrink:0}
.acc-lbl{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#666;flex:1}
.acc-bdg{background:#c0392b;color:#fff;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:700}
.acc-chv{color:#333;font-size:12px;flex-shrink:0}
.acc-body{display:none;padding:0 14px 14px}
.acc-body.open{display:block}

/* TABS */
#tabs{display:flex;background:#0a0a0a;border-bottom:1px solid #1a1a1a;position:sticky;top:72px;z-index:100;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
#tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:11px 12px;background:transparent;border:none;border-bottom:2px solid transparent;color:#555;font-size:12px;font-weight:600;white-space:nowrap}
.tab.on{border-bottom-color:#f0c040;color:#f0c040}

/* MAIN */
#main{padding:0 14px 40px}
.n-head{display:flex;align-items:center;gap:10px;padding:14px 0 10px;border-bottom:1px solid #1a1a1a;margin-bottom:6px}
.n-title{font-size:20px;font-weight:800;color:#fff}
.n-cnt{background:#222;color:#888;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.note{font-size:10px;color:#3a5a3a;font-style:italic;margin-bottom:10px}

/* SPINNER */
.sp{width:15px;height:15px;border:2px solid #222;border-top-color:#f0c040;border-radius:50%;animation:spn .8s linear infinite;display:none;flex-shrink:0}
.sp.on{display:block}
@keyframes spn{to{transform:rotate(360deg)}}

/* SKELETON */
.sk{background:#181818;border-radius:5px;animation:pulse 1.5s infinite;margin-bottom:7px}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:.2}}

/* NEWS CARD */
.nc{padding:13px 0;border-bottom:1px solid #131313}
.nc.brk{border-left:3px solid #c0392b;padding-left:10px;background:#130303}
.brk-lbl{font-size:10px;font-weight:700;color:#c0392b;margin-bottom:4px}
.nc-meta{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap}
.nc-src{font-size:10px;font-weight:700;color:#fff;background:#c0392b;padding:2px 6px;border-radius:3px;text-transform:uppercase;flex-shrink:0}
.nc-dt{font-size:10px;color:#333}
.nc-title{font-size:14px;font-weight:700;line-height:1.45;color:#e8e4dc;cursor:pointer;margin-bottom:6px}
.nc-title:active{color:#f0c040}
.nc-body{font-size:12px;line-height:1.7;color:#666;margin-bottom:8px;display:none}
.nc-body.open{display:block}
.nc-footer{display:flex;gap:10px;align-items:center}
.btn-detail{background:#1a1a1a;color:#888;padding:4px 10px;border-radius:12px;font-size:11px;font-weight:600;border:none;cursor:pointer}
.nc-link{font-size:11px;color:#f0c040;font-weight:600}

/* HISTORY */
.hi{display:flex;gap:14px;padding:10px 0;border-bottom:1px solid #141414}
.hi-yr{min-width:48px;font-size:19px;font-weight:800;color:#f0c040;flex-shrink:0;line-height:1.2}
.hi-tx{font-size:13px;line-height:1.75;color:#b0aca4}
.hi-note{font-size:10px;color:#2a2a2a;margin-top:8px;font-style:italic}

/* FOLK CALENDAR */
.ev{margin-bottom:8px;border-radius:10px;overflow:hidden;border:1px solid #1c1c1c;background:#0f0f0f}
.ev.hot{border-color:rgba(240,192,64,.35);background:#100e00}
.ev-head{display:flex;align-items:center;gap:10px;padding:12px;cursor:pointer;user-select:none;-webkit-user-select:none}
.ev-em{font-size:22px;min-width:30px}
.ev-info{flex:1;min-width:0}
.ev-name{font-size:13px;font-weight:700;display:block;margin-bottom:2px;color:#e8e4dc}
.ev-date{color:#3a3a3a;font-size:10px;display:block;margin-bottom:2px}
.ev-short{color:#555;font-size:10px;display:block}
.ev-badge{color:#fff;padding:3px 8px;border-radius:10px;font-size:9px;font-weight:700;white-space:nowrap;flex-shrink:0}
.ev-arr{color:#2e2e2e;font-size:11px;margin-left:4px;flex-shrink:0}
.ev-detail{display:none;padding:0 12px 14px 54px;border-top:1px solid #181818}
.ev-detail.open{display:block}
.ev-text{font-size:12px;line-height:1.9;color:#999;margin-top:10px}

/* TOAST */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:9999;background:#111;color:#f0c040;border:1px solid #b8860b;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;box-shadow:0 4px 24px rgba(0,0,0,.8);display:none;max-width:90vw;text-align:center}
#toast.on{display:block;animation:tup .3s ease}
@keyframes tup{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

#sbar{font-size:10px;color:#2a2a2a;padding:3px 14px;min-height:16px}
.empty{color:#444;font-size:13px;padding:24px 0;text-align:center;line-height:1.9}
.stale-note{font-size:10px;color:#3a3020;font-style:italic;padding:4px 0 6px}
</style>

</head>

function ge(id){ return document.getElementById(id); }

function esc(s){
  var d = document.createElement("div");

  return d.innerHTML;
}

function stripHtml(h){
  if(!h) return "";
  var d = document.createElement("div");
  d.innerHTML = h;
  return (d.textContent || d.innerText || "").replace(/\s+/g," ").trim();
}

function timeAgo(iso){
  try{
    var dt = new Date(iso);
    if(isNaN(dt)) return "";
    var m = Math.floor((Date.now()-dt)/60000);
    if(m < 1) return "az önce";
    if(m < 60) return m + " dk önce";
    if(m < 1440) return Math.floor(m/60) + " sa önce";
    return dt.toLocaleDateString("tr-TR",{day:"numeric",month:"short"});
  }catch(e){ return ""; }
}

function fmtDate(d){ return d.toLocaleDateString("tr-TR",{day:"numeric",month:"long"}); }
function fmtDateY(d){ return d.toLocaleDateString("tr-TR",{day:"numeric",month:"long",year:"numeric"}); }

function isBreaking(title){
  if(!title) return false;
  var tl = (title||"").toLowerCase();
  for(var i=0;i<BREAK_WORDS.length;i++) if(tl.indexOf(BREAK_WORDS[i])>=0) return true;
  return false;
}

}

    if(doc.querySelector("parsererror")) doc = new DOMParser().parseFromString(txt, "text/html");
    var items = Array.prototype.slice.call(doc.querySelectorAll("item,entry"));
    return items.slice(0,8).map(function(item){
      var te = item.querySelector("title");
      var title = stripHtml(te ? te.textContent : "");
      if(!title || title.length < 4) return null;
      var le = item.querySelector("link");
      var url = le ? (le.getAttribute("href") || stripHtml(le.textContent) || "") : "";
      if(!url || url.indexOf("http") !== 0){
        var ge2 = item.querySelector("guid");
        if(ge2){ var gv = stripHtml(ge2.textContent); if(gv.indexOf("http") === 0) url = gv; }
      }
      var de = item.querySelector("description") || item.querySelector("summary") || item.querySelector("content");
      var summ = de ? stripHtml(de.textContent).slice(0,220) : "";
      var dte = item.querySelector("pubDate") || item.querySelector("published") || item.querySelector("updated");
      var pub = dte ? new Date(stripHtml(dte.textContent)).toISOString() : new Date().toISOString();
      return {title:title, summary:summ, url:url, pub:pub};
    }).filter(Boolean);
  }catch(e){ return []; }
}

function tryProxy(feedUrl, idx){
  if(idx >= PROXY_LIST.length) return Promise.resolve([]);
  var proxyUrl = PROXY_LIST[idx](feedUrl);
  return tfetch(proxyUrl, 12000)
    .then(function(r){
      if(!r.ok) throw new Error("HTTP " + r.status);
      return r.text();
    })
    .then(function(txt){
      /* rss2json returns JSON */
      if(idx === 0){
        try{
          var d = JSON.parse(txt);
          if(d.status === "ok" && d.items && d.items.length){
            return d.items.map(function(item){
              return {
                title:   stripHtml(item.title || ""),
                summary: stripHtml(item.description || item.content || "").slice(0,220),
                url:     item.link || "",
                pub:     item.pubDate || ""
              };
            }).filter(function(i){ return i.title && i.title.length > 4; });
          }
        }catch(e){}
        throw new Error("r2j failed");
      }
      /* allorigins /get returns JSON wrapper */
      if(idx === 1){
        try{
          var d2 = JSON.parse(txt);
          if(d2.contents) txt = d2.contents;
        }catch(e){}
      }
      var items = parseXMLitems(txt);
      if(!items.length) throw new Error("no items");
      return items;
    })
    .catch(function(){
      return tryProxy(feedUrl, idx + 1);
    });
}

function fetchRSS(feedUrl, count){
  return tryProxy(feedUrl, 0);
}

/* ── TRANSLATE ── */
function translate(text){
  return new Promise(function(resolve){
    if(!text || text.length < 3){ resolve(text); return; }
    var t = text.slice(0,400);
    var ck = "tx_" + t.slice(0,16).replace(/[^a-z0-9]/gi,"");
    var hit = CACHE.get(ck, 86400000);
    if(hit){ resolve(hit); return; }
    tfetch("https://api.mymemory.translated.net/get?q=" + encodeURIComponent(t) + "&langpair=en|tr", 8000)
      .then(function(r){ return r.json(); })
      .then(function(d){
        if(d.responseStatus===200 && d.responseData && d.responseData.translatedText){
          CACHE.set(ck, d.responseData.translatedText);
          resolve(d.responseData.translatedText);
        } else resolve(text);
      })
      .catch(function(){ resolve(text); });
  });
}

/* ── LOAD NEWS ── */
function loadTR(){
  return new Promise(function(resolve){
    var cached = CACHE.get("tr");
    if(cached){ resolve({data:cached, stale:false}); return; }
    setSpin("tr",true); setSpin("al",true);
    Promise.all(TR_SOURCES.map(function(s){
      return fetchRSS(s.u, 4).then(function(items){
        return items.map(function(i){ return Object.assign({source:s.n}, i); });
      });
    })).then(function(results){
      var all = [];
      results.forEach(function(r){ all = all.concat(r); });
      all.sort(function(a,b){ return new Date(b.pub)-new Date(a.pub); });
      all = all.slice(0,12);
      setSpin("tr",false);
      if(all.length){ CACHE.set("tr",all); resolve({data:all,stale:false}); }
      else{ var o=CACHE.getOld("tr"); resolve({data:o?o.v:[], stale:true, at:o?o.t:0}); }
    });
  });
}

function loadWO(){
  return new Promise(function(resolve){
    var cached = CACHE.get("wo");
    if(cached){ resolve({data:cached, stale:false}); return; }
    setSpin("wo",true);
    Promise.all(WO_SOURCES.map(function(s){
      return fetchRSS(s.u, 3).then(function(items){
        return items.map(function(i){ return Object.assign({source:s.n}, i); });
      });
    })).then(function(results){
      var all = [];
      results.forEach(function(r){ all = all.concat(r); });
      all.sort(function(a,b){ return new Date(b.pub)-new Date(a.pub); });
      all = all.slice(0,12);

      if(!all.length){

        resolve({data:o?o.v:[], stale:true, at:o?o.t:0});

      }
      /* Önce haberleri göster, sonra arka planda çevir */
      resolve({data:all, stale:false});

      Promise.all(all.map(function(item){

        }).catch(function(){ return item; });
      })).then(function(translated){

        var ctr = CACHE.get("tr");

      resolve({data:o?o.v:[], stale:true, at:o?o.t:0});
    });
  });
}

/* ── HISTORY ── */
function loadHistory(){
  return new Promise(function(resolve){
    var td = new Date(), m = td.getMonth()+1, d = td.getDate();
    var ck = "hist_"+m+"_"+d;
    var cached = CACHE.get(ck, 43200000);
    if(cached){ resolve(cached); return; }
    tfetch("https://tr.wikipedia.org/api/rest_v1/feed/onthisday/events/"+m+"/"+d, 10000)
      .then(function(r){ return r.json(); })
      .then(function(data){
        if(!data.events || !data.events.length) throw 0;
        var evts = data.events
          .map(function(e){ return {year:parseInt(e.year)||0, event:e.text}; })
          .filter(function(e){ return e.year>0 && e.event; })
          .sort(function(a,b){ return b.year-a.year; })
          .slice(0,25);
        CACHE.set(ck,evts); resolve(evts);
      })
      .catch(function(){
        /* EN fallback */
        tfetch("https://en.wikipedia.org/api/rest_v1/feed/onthisday/events/"+m+"/"+d, 10000)
          .then(function(r){ return r.json(); })
          .then(function(data){
            if(!data.events || !data.events.length){ resolve([]); return; }
            var picked = data.events
              .map(function(e){ return {year:parseInt(e.year)||0, event:e.text}; })
              .filter(function(e){ return e.year>0; })
              .sort(function(a,b){ return b.year-a.year; })
              .slice(0,25);
            Promise.all(picked.map(function(e){
              return translate(e.event).then(function(t){ return {year:e.year,event:t}; });
            })).then(function(evts){ CACHE.set(ck,evts); resolve(evts); });
          })
          .catch(function(){ resolve([]); });
      });
  });
}

function getXAccounts(){
  try{ var r=localStorage.getItem("neo_xa"); if(r) return JSON.parse(r); }catch(e){}
  return X_DEFAULTS.map(function(x){ return {u:x.u, en:x.en}; });

function saveXAccounts(a){ try{ localStorage.setItem("neo_xa",JSON.stringify(a)); }catch(e){} }

var xLoaded = false;
function loadX(){
  xLoaded = true;
  var accts = getXAccounts();
  var el = ge("list-xt");
  if(!accts.length){
    el.innerHTML = '<div class="empty">Henüz hesap eklenmedi.<br>⚙️ Hesaplar butonuna basın.</div>';
    return;
  }
  var cached = CACHE.get("xt");
  if(cached){ renderNews(cached, "list-xt", null, null, true); return; }
  setSpin("xt",true);
  el.innerHTML = makeSkel(4);

  /* Twitter için birden fazla RSS kaynağı dene */
  function fetchXAccount(username){
    var sources = [
      "https://rsshub.app/twitter/user/" + username,
      "https://rsshub.app/x/user/" + username,
      "https://nitter.net/" + username + "/rss",
      "https://nitter.privacydev.net/" + username + "/rss",
      "https://nitter.poast.org/" + username + "/rss"
    ];
    return tryXSource(username, sources, 0);
  }

  function tryXSource(username, sources, idx){
    if(idx >= sources.length) return Promise.resolve([]);
    return tryProxy(sources[idx], 0)
      .then(function(items){
        if(items && items.length > 0) return items;
        return tryXSource(username, sources, idx+1);
      })
      .catch(function(){
        return tryXSource(username, sources, idx+1);
      });
  }

  Promise.all(accts.map(function(acc){
    return fetchXAccount(acc.u)
      .then(function(items){
        var tagged = (items||[]).map(function(i){ return Object.assign({source:"@"+acc.u}, i); });
        /* Önce göster, sonra çevir */
        if(!acc.en) return tagged;
        return Promise.all(tagged.map(function(item){
          return translate(item.title)
            .then(function(t){ return Object.assign({},item,{title:t}); })
            .catch(function(){ return item; });
        }));
      }).catch(function(){ return []; });
  })).then(function(results){
    var all = [];
    results.forEach(function(r){ if(r) all = all.concat(r); });
    all.sort(function(a,b){ return new Date(b.pub)-new Date(a.pub); });
    all = all.slice(0,20);
    setSpin("xt",false);
    if(all.length){
      CACHE.set("xt",all);
      renderNews(all,"list-xt",null,null,true);
    } else {
      var old = CACHE.getOld("xt");
      if(old && old.v && old.v.length){
        renderNews(old.v,"list-xt",null,null,true);
        toast("⚠️ Eski Twitter gönderileri gösteriliyor");
      } else {
        el.innerHTML = '<div class="empty">Twitter yüklenemedi.<br><small>RSSHub ve Nitter şu an erişilemiyor olabilir.</small></div>';
      }
    }
  });
}

/* ── DYNAMIC DATE CALCULATIONS ── */
function calcEaster(y){
  var a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,
      f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),
      h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,
      l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),
      mo=Math.floor((h+l-7*m+114)/31),da=((h+l-7*m+114)%31)+1;
  return new Date(y,mo-1,da);
}
function calcMothersDay(y){
  var d=new Date(y,4,1),count=0;
  while(count<2){ if(d.getDay()===0) count++; if(count<2) d.setDate(d.getDate()+1); }
  return d;
}

/* ── ACTIVE FOLK EVENTS ── */
function getActiveEvents(){
  var today = new Date();
  var year = today.getFullYear();
  var tn = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  var results = [];

  FOLK.forEach(function(ev){
    var start, end;
    if(ev.dyn === "easter"){
      var ed = calcEaster(year);
      if(ed < new Date(+tn - 15*864e5)) ed = calcEaster(year+1);
      start = end = ed;
    } else if(ev.dyn === "mothersday"){
      var md = calcMothersDay(year);
      if(md < new Date(+tn - 15*864e5)) md = calcMothersDay(year+1);
      start = end = md;
    } else if(ev.tp === "s"){
      var yr = year;
      var t0 = new Date(yr, ev.m-1, ev.d);
      if(t0 < new Date(+tn - 15*864e5)) yr++;
      start = end = new Date(yr, ev.m-1, ev.d);
    } else {
      var sy = year, ey = year;
      if(ev.sM > ev.eM){
        if(today.getMonth()+1 <= ev.eM) sy = year-1; else ey = year+1;
      }
      start = new Date(sy, ev.sM-1, ev.sD);
      end   = new Date(ey, ev.eM-1, ev.eD);
    }

    var ds = Math.floor((start - tn) / 864e5);
    var de = Math.floor((end - tn) / 864e5);

    if(ds <= 15 && de >= -15){
      var st;
      if(ev.tp === "p"){
        if(ds<=0 && de>=0) st="act";
        else if(de < 0)    st="past";
        else               st="soon";
      } else {
        if(ds===0)    st="act";
        else if(ds<0) st="past";
        else          st="soon";
      }
      results.push({ev:ev, start:start, end:end, ds:ds, de:de, st:st});
    }
  });

  results.sort(function(a,b){ return a.ds - b.ds; });
  return results;
}

/* ── RENDER HELPERS ── */
function makeSkel(n){
  var h=""; n=n||4;
  for(var i=0;i<n;i++){
    h+='<div style="padding:14px 0;border-bottom:1px solid #1a1a1a">';
    h+='<div class="sk" style="height:10px;width:'+(20+i*10)+'%"></div>';
    h+='<div class="sk" style="height:16px;width:95%"></div>';
    h+='<div class="sk" style="height:11px;width:'+(50+i*7)+'%"></div>';
    h+='<div class="sk" style="height:10px;width:24%"></div></div>';
  }
  return h;
}

function renderNews(items, listId, cntId, staleId, isX){
  var el = ge(listId);
  var cnt = cntId ? ge(cntId) : null;
  var stEl = staleId ? ge(staleId) : null;

  if(stEl) stEl.innerHTML = "";

  if(!items || !items.length){
    el.innerHTML = '<div class="empty">Haber yüklenemedi.<br><small>🔄 Yenile butonuna basın.<br>İnternet bağlantınızı kontrol edin.</small></div>';
    if(cnt) cnt.style.display = "none";
    return;
  }

  if(cnt){ cnt.textContent = items.length + " haber"; cnt.style.display = "inline"; }

  var h = "";
  for(var i=0;i<items.length;i++){
    var it = items[i];
    var brk = !isX && (isBreaking(it.title) || isBreaking(it.origTitle||""));
    h += '<div class="nc' + (brk?' brk':'') + '">';
    if(brk) h += '<div class="brk-lbl">🔴 SON DAKİKA</div>';
    h += '<div class="nc-meta">';
    var srcStyle = isX ? 'style="background:#000;border:1px solid #333"' : "";
    h += '<span class="nc-src" '+srcStyle+'>' + esc(it.source) + '</span>';
    h += '<span class="nc-dt">' + timeAgo(it.pub) + '</span>';
    h += '</div>';
    h += '<div class="nc-title">' + esc(it.title) + '</div>';
    h += '<div class="nc-body">' + esc(it.summary || "Haberin tamamı için kaynağı ziyaret edin.") + '</div>';
    h += '<div class="nc-footer"><button class="btn-detail">Özet</button>';
    if(it.url && it.url.indexOf("http")===0){
      h += '<a class="nc-link" href="'+esc(it.url)+'" target="_blank" rel="noopener">🔗 Habere Git</a>';
    }
    h += '</div></div>';
  }
  el.innerHTML = h;

  /* Click handlers via delegation */
  el.addEventListener("click", function(ev){
    var title = ev.target.closest(".nc-title");
    var btn   = ev.target.closest(".btn-detail");
    var nc = title ? title.closest(".nc") : (btn ? btn.closest(".nc") : null);
    if(nc){
      var body = nc.querySelector(".nc-body");
      var b    = nc.querySelector(".btn-detail");
      var open = body.classList.toggle("open");
      if(b) b.textContent = open ? "Gizle" : "Özet";
    }
  });
}

function renderHistory(evts){
  var el = ge("hist-content");
  if(!evts || !evts.length){ el.innerHTML='<p class="empty">Tarihsel veri yüklenemedi.</p>'; return; }
  var h = "";
  for(var i=0;i<evts.length;i++)
    h += '<div class="hi"><span class="hi-yr">'+evts[i].year+'</span><p class="hi-tx">'+esc(evts[i].event)+'</p></div>';
  h += '<p class="hi-note">Kaynak: Vikipedi · Yakın tarihten uzağa</p>';
  el.innerHTML = h;
}

function renderFolk(){
  var el = ge("folk-content");
  var evts = getActiveEvents();
  if(!evts.length){ el.innerHTML='<p class="empty">Bu dönemde aktif takvim olayı yok.</p>'; return; }

  function badgeColor(st){ return st==="act"?"#c0392b":st==="soon"?"#e67e22":"#555"; }
  function badgeText(ev){
    if(ev.st==="act") return ev.ev.tp==="p"?(ev.de===0?"Bugün bitiyor":ev.de+" gün daha"):"Bugün!";
    if(ev.st==="soon") return ev.ds+" gün sonra";
    return Math.abs(ev.de)+" gün önce bitti";
  }

  var h = "";
  for(var i=0;i<evts.length;i++){
    var ev = evts[i], e = ev.ev;
    var dateStr;
    if(e.dyn==="easter")       dateStr = "Paskalya " + ev.start.getFullYear() + ": " + fmtDateY(ev.start);
    else if(e.dyn==="mothersday") dateStr = "Anneler Günü: " + fmtDateY(ev.start);
    else if(ev.ev.tp==="p")    dateStr = fmtDate(ev.start) + " – " + fmtDate(ev.end);
    else                        dateStr = fmtDateY(ev.start);

    h += '<div class="ev' + (ev.st==="act"?" hot":"") + '">';
    h += '<div class="ev-head" data-eid="'+e.id+'">';
    h += '<span class="ev-em">'+e.em+'</span>';
    h += '<div class="ev-info">';
    h += '<strong class="ev-name">'+esc(e.nm)+'</strong>';
    h += '<span class="ev-date">'+dateStr+'</span>';
    h += '<span class="ev-short">'+esc(e.sh)+'</span>';
    h += '</div>';
    h += '<span class="ev-badge" style="background:'+badgeColor(ev.st)+'">'+badgeText(ev)+'</span>';
    h += '<span class="ev-arr" id="arr-'+e.id+'">&#9660;</span>';
    h += '</div>';
    h += '<div class="ev-detail" id="det-'+e.id+'"><p class="ev-text">'+esc(e.fl)+'</p></div>';
    h += '</div>';
  }
  el.innerHTML = h;

  el.addEventListener("click", function(ev2){
    var hd = ev2.target.closest(".ev-head");
    if(hd){
      var id = hd.getAttribute("data-eid");
      var det = ge("det-"+id), arr = ge("arr-"+id);
      if(det && arr){
        var o = det.classList.toggle("open");
        arr.innerHTML = o ? "&#9650;" : "&#9660;";
      }
    }
  });
}

/* ── NOTIFICATIONS ── */
var notifActive = localStorage.getItem("neo_notif") === "1";

function updateNotifUI(){
  var btn = ge("btn-notif"), lbl = ge("notif-lbl");
  if(!btn || !lbl) return;
  if(notifActive){
    btn.classList.add("on"); lbl.textContent = "Aktif ✓";
  } else {
    btn.classList.remove("on"); lbl.textContent = "Bildirimler";
  }
}

function toggleNotif(){
  notifActive = !notifActive;
  localStorage.setItem("neo_notif", notifActive ? "1" : "0");
  updateNotifUI();
  if(notifActive){
    /* iOS Safari: Sadece ana ekrandan PWA olarak açıldığında native bildirim çalışır */
    var isiOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    var isStandalone = window.navigator.standalone === true;
    if(typeof Notification !== "undefined"){
      if(Notification.permission === "default"){
        var p = Notification.requestPermission();
        if(p && typeof p.then === "function"){
          p.then(function(perm){
            if(perm === "granted"){
              toast("🔔 Bildirimler açık! Sistem bildirimleri aktif.");
            } else {
              toast("🔔 Uygulama bildirimleri açık. Sistem bildirimi için izin gerekli.");
            }
          }).catch(function(){});
        }
      } else if(Notification.permission === "granted"){
        toast("🔔 Bildirimler açık! Saat başı bildirim alacaksınız.");
      } else {
        toast("🔔 Uygulama bildirimleri açık. Sistem bildirimi için ayarlardan izin verin.");
      }
    } else if(isiOS && !isStandalone){
      toast("🔔 Açık! Sistem bildirimi için 'Ana Ekrana Ekle' yapın.");
    } else {
      toast("🔔 Bildirimler açık!");
    }
  } else {
    toast("🔕 Bildirimler kapatıldı.");
  }
}

function sendNotif(title, body){
  if(!notifActive) return;
  /* Her zaman uygulama içi toast göster */
  toast("🔔 " + title);
  /* Sistem bildirimi - desteklenen platformlarda */
  try{
    if(typeof Notification !== "undefined" && Notification.permission === "granted"){
      new Notification(title, {body: body || "", icon: "data:image/png;base64,iVBORw0KGgo="});
    }
  }catch(x){}
}

/* ── CHECK BREAKING NEWS ── */
var seenBreaking = [];
function checkBreaking(items){
  (items||[]).forEach(function(item){
    var id = (item.pub||"") + (item.title||"").slice(0,20);
    if(isBreaking(item.title) && seenBreaking.indexOf(id)<0){
      seenBreaking.push(id);
      if(seenBreaking.length>100) seenBreaking.shift();
      sendNotif("🔴 SON DAKİKA: " + item.title, item.source);
    }
  });
}

/* ── TOAST ── */
var toastTimer = null;
function toast(msg){
  var el = ge("toast"); el.textContent = msg; el.classList.add("on");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ el.classList.remove("on"); }, 5000);
}

/* ── SPIN ── */
function setSpin(id, on){
  var el = ge("sp-"+id);
  if(el){ if(on) el.classList.add("on"); else el.classList.remove("on"); }
}

/* ── TABS ── */
function switchTab(id){
  ["tr","wo","al"].forEach(function(t){
    var p = ge("p-"+t); if(p) p.style.display = t===id?"block":"none";
  });
  document.querySelectorAll(".tab").forEach(function(b){
    b.classList.toggle("on", b.getAttribute("data-tab")===id);
  });
  if(id==="xt" && !xLoaded) loadX();
}

/* ── ACCORDION ── */
function toggleAcc(bodyId, chvId){
  var body = ge(bodyId), chv = ge(chvId);
  if(!body || !chv) return;
  var open = body.classList.toggle("open");
  chv.innerHTML = open ? "&#9650;" : "&#9660;";
}

/* ── CLOCK ── */
function tickClock(){
  var el = ge("clk");
  if(el) el.textContent = new Date().toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"});
}
setInterval(tickClock, 1000); tickClock();

function setUpd(){
  var el = ge("upd-t");
  if(el) el.textContent = new Date().toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"});
}

/* ── REFRESH ── */
function doRefresh(){
  toast("🔄 Güncelleniyor...");
  CACHE.del("tr"); CACHE.del("wo"); CACHE.del("xt");
  var d = new Date(); CACHE.del("hist_"+(d.getMonth()+1)+"_"+d.getDate());
  ["list-tr","list-wo","list-al","list-xt"].forEach(function(id){
    var el=ge(id); if(el) el.innerHTML=makeSkel();
  });
  ["stale-tr","stale-wo"].forEach(function(id){var el=ge(id);if(el)el.innerHTML="";});
  var hc=ge("hist-content"); if(hc) hc.innerHTML=makeSkel(3);
  ["tr","wo","al","xt"].forEach(function(t){setSpin(t,true);});
  xLoaded = false;

  Promise.all([loadTR(), loadWO(), loadHistory()]).then(function(res){
    var tr=res[0], wo=res[1], hist=res[2];
    renderNews(tr.data, "list-tr", "cnt-tr", "stale-tr", false);
    renderNews(wo.data, "list-wo", "cnt-wo", "stale-wo", false);
    var all = (tr.data||[]).concat(wo.data||[]).sort(function(a,b){return new Date(b.pub)-new Date(a.pub);}).slice(0,15);
    renderNews(all, "list-al", "cnt-al", null, false);
    var noteAl=ge("note-al"); if(noteAl) noteAl.style.display=(wo.data||[]).length>0?"block":"none";
    renderHistory(hist);
    ["tr","wo","al","xt"].forEach(function(t){setSpin(t,false);});
    setUpd();
    var tl=(tr.data||[]).length, wl=(wo.data||[]).length;
    var sbar=ge("sbar"); if(sbar) sbar.textContent=tl+" TR + "+wl+" Dünya";
    toast("✅ "+tl+" TR + "+wl+" haber yüklendi");
    checkBreaking((tr.data||[]).concat(wo.data||[]));
    sendNotif("Ne Olmuş güncellendi", tl+" TR + "+wl+" haber");
  });
}

/* ── INIT (DOMContentLoaded) ── */
document.addEventListener("DOMContentLoaded", function(){

  /* Tab clicks */
  document.querySelectorAll(".tab").forEach(function(btn){
    btn.addEventListener("click", function(){
      switchTab(this.getAttribute("data-tab"));
    });
  });

  /* Accordion - History */
  var accH = ge("acc-hist");
  if(accH) accH.addEventListener("click", function(){ toggleAcc("body-hist","hist-chv"); });

  /* Accordion - Folk */
  var accF = ge("acc-folk");
  if(accF) accF.addEventListener("click", function(){ toggleAcc("body-folk","folk-chv"); });

  /* Header buttons */
  updateNotifUI();
  var btnN = ge("btn-notif"); if(btnN) btnN.addEventListener("click", toggleNotif);
  var btnR = ge("btn-refresh"); if(btnR) btnR.addEventListener("click", doRefresh);

  /* X drawer */
  var btnXM = ge("btn-x-manage");
  if(btnXM) btnXM.addEventListener("click", function(){
    renderXList();
    ge("xdr").classList.add("open");
  });
  var btnXC = ge("btn-xa-close");
  if(btnXC) btnXC.addEventListener("click", function(){
    ge("xdr").classList.remove("open");
    CACHE.del("xt"); xLoaded=false; loadX();
  });
  var xdrEl = ge("xdr");
  if(xdrEl) xdrEl.addEventListener("click", function(ev){ if(ev.target===this) this.classList.remove("open"); });
  var btnXA = ge("btn-xa-add");
  if(btnXA) btnXA.addEventListener("click", function(){
    var inp = ge("xa-input"), sel = ge("xa-select");
    var raw = inp.value.replace(/^@/,"").trim();
    if(!raw){ toast("Kullanıcı adı girin"); return; }
    var a = getXAccounts();
    if(a.length>=10){ toast("Maksimum 10 hesap"); return; }
    for(var i=0;i<a.length;i++) if(a[i].u.toLowerCase()===raw.toLowerCase()){ toast("@"+raw+" zaten listede"); return; }
    a.push({u:raw, en:sel.value==="en"});
    saveXAccounts(a); inp.value=""; renderXList(); toast("@"+raw+" eklendi");
  });
  var xaInp = ge("xa-input");
  if(xaInp) xaInp.addEventListener("keydown", function(ev){
    if(ev.key==="Enter"){ var b=ge("btn-xa-add"); if(b) b.click(); }
  });

  /* ── START ── */
  var today = new Date();
  var hbdg = ge("hist-badge");
  if(hbdg) hbdg.textContent = today.toLocaleDateString("tr-TR",{day:"numeric",month:"long"});

  renderFolk();
  var bh = ge("body-hist"); if(bh) bh.classList.add("open");
  var hc = ge("hist-chv"); if(hc) hc.innerHTML = "&#9650;";

  ["list-tr","list-wo","list-al"].forEach(function(id){ var el=ge(id); if(el) el.innerHTML=makeSkel(); });
  ["tr","wo","al"].forEach(function(t){ setSpin(t,true); });
  var sb = ge("sbar"); if(sb) sb.textContent = "Haberler yükleniyor... (5-15 sn sürebilir)";

  Promise.all([loadTR(), loadWO(), loadHistory()]).then(function(res){
    var tr=res[0], wo=res[1], hist=res[2];

    renderNews(tr.data, "list-tr", "cnt-tr", "stale-tr", false);
    renderNews(wo.data, "list-wo", "cnt-wo", "stale-wo", false);

    var all = (tr.data||[]).concat(wo.data||[]).sort(function(a,b){
      return new Date(b.pub)-new Date(a.pub);
    }).slice(0,15);
    renderNews(all, "list-al", "cnt-al", null, false);

    var noteAl=ge("note-al");
    if(noteAl) noteAl.style.display = (wo.data||[]).length>0?"block":"none";

    renderHistory(hist);
    ["tr","wo","al"].forEach(function(t){ setSpin(t,false); });
    setUpd();

    var tl=(tr.data||[]).length, wl=(wo.data||[]).length;
    if(sb) sb.textContent = tl+" TR + "+wl+" Dünya" + (tr.stale||wo.stale?" (önceki saatten)":"");
    checkBreaking((tr.data||[]).concat(wo.data||[]));

    /* Hourly auto-refresh */
    setInterval(function(){
      CACHE.del("tr"); CACHE.del("wo"); CACHE.del("xt");
      xLoaded = false;
      Promise.all([loadTR(), loadWO()]).then(function(r2){
        var t2=r2[0], w2=r2[1];
        renderNews(t2.data,"list-tr","cnt-tr","stale-tr",false);
        renderNews(w2.data,"list-wo","cnt-wo","stale-wo",false);
        var a=(t2.data||[]).concat(w2.data||[]).sort(function(a,b){return new Date(b.pub)-new Date(a.pub);}).slice(0,15);
        renderNews(a,"list-al","cnt-al",null,false);
        setUpd();
        var tl2=(t2.data||[]).length, wl2=(w2.data||[]).length;
        if(sb) sb.textContent = tl2+" TR + "+wl2+" Dünya";
        checkBreaking((t2.data||[]).concat(w2.data||[]));
        sendNotif("Saatlik güncelleme", tl2+" TR + "+wl2+" haber");
        var pxt=ge("p-xt");
        if(pxt && pxt.style.display!=="none"){ xLoaded=false; loadX(); }
      });
    }, 3600000);
  });
});
</script>
